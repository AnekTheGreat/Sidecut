<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sidecut — your files, your player</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0E1B1F">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sidecut">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root{
    --bg: #0E1B1F;
    --bg-raised: #16262B;
    --ink: #EDECE7;
    --ink-dim: #9BAAAC;
    --coral: #FF6F59;
    --gold: #D4A574;
    --line: rgba(237,236,231,0.09);
    --radius: 14px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{height:100%; margin:0;}
  body{
    background: var(--bg); color: var(--ink); font-family:'Inter',sans-serif;
    min-height:100dvh; display:flex; flex-direction:column; overflow-x:hidden;
  }
  ::selection{ background: var(--coral); color:#161616; }
  h1,h2,h3{ font-family:'Fraunces', serif; font-weight:600; margin:0; }

  header{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px 10px; }
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{ width:30px; height:30px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--gold), var(--coral) 70%);
    box-shadow: 0 0 0 2px var(--line); flex-shrink:0; }
  .brand h1{ font-size:19px; }
  .brand span{ display:block; font-size:11px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace; letter-spacing:0.5px; }

  .action-strip{
    display:flex; gap:8px; padding: 2px 20px 14px; overflow-x:auto;
  }
  .action-strip::-webkit-scrollbar{ display:none; }
  .action-pill{
    flex-shrink:0; font-size:12.5px; font-weight:600; padding:8px 14px; border-radius:18px;
    cursor:pointer; white-space:nowrap; border:1px solid var(--line);
    background: var(--bg-raised); color: var(--ink-dim);
  }
  .action-pill.primary{ background: var(--coral); color:#161616; border-color:var(--coral); }
  .search-row{
    display:flex; align-items:center; gap:8px; margin: 2px 20px 14px;
    background: var(--bg-raised); border:1px solid var(--line); border-radius:12px; padding:9px 12px;
  }
  .search-row svg{ width:16px; height:16px; color:var(--ink-dim); flex-shrink:0; }
  .search-row input{
    flex:1; background:none; border:none; color:var(--ink); font-size:14px; font-family:'Inter',sans-serif; outline:none;
  }
  .search-row input::placeholder{ color:var(--ink-dim); }

  /* ---------- Empty state ---------- */
  #emptyState{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:24px; text-align:center; }
  .disc{
    width:120px; height:120px; border-radius:50%;
    background: repeating-radial-gradient(circle at center, #1c2e33 0 2px, #223338 2px 4px);
    border:6px solid #223338; position:relative;
    display:flex; align-items:center; justify-content:center;
    animation: spin 6s linear infinite; animation-play-state: paused;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  .disc.spinning{ animation-play-state: running; }
  .disc::after{ content:''; width:20px; height:20px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--gold), var(--coral) 75%); }
  @keyframes spin{ to{ transform: rotate(360deg); } }
  #emptyState h2{ font-size:24px; max-width:300px; line-height:1.3; }
  #emptyState p{ color:var(--ink-dim); max-width:280px; font-size:14px; line-height:1.5; }

  /* ---------- Library ---------- */
  #library{ display:none; flex:1; flex-direction:column; min-height:0; }
  .tabs{ display:flex; gap:8px; padding:4px 20px 14px; overflow-x:auto; }
  .tabs::-webkit-scrollbar{ display:none; }
  .tab{
    flex-shrink:0; padding:7px 15px; border-radius:20px; font-size:12.5px;
    color:var(--ink-dim); background: var(--bg-raised); border:1px solid var(--line);
    cursor:pointer; white-space:nowrap;
  }
  .tab.active{ color:var(--bg); background:var(--gold); border-color:var(--gold); font-weight:600; }

  #listPane{ flex:1; overflow-y:auto; padding: 4px 0 150px; min-height:0; }
  .pane-header{ padding:8px 20px 14px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); margin-bottom:6px; }
  .pane-header h2{ font-size:20px; }
  .pane-header .sub{ color:var(--ink-dim); font-size:12px; margin-top:3px; font-family:'JetBrains Mono',monospace; }
  .pane-actions{ display:flex; gap:8px; }
  .icon-btn{
    background:none; border:1px solid var(--line); color:var(--ink-dim);
    width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .icon-btn svg{ width:16px; height:16px; }

  .track{
    display:flex; align-items:center; gap:12px; padding:11px 20px;
    cursor:pointer; border-bottom:1px solid var(--line);
  }
  .track:active{ background: rgba(255,255,255,0.03); }
  .track .idx{ width:20px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace; font-size:12px; text-align:center; flex-shrink:0; }
  .track.playing{
    background: linear-gradient(90deg, rgba(255,111,89,0.14), rgba(255,111,89,0.02));
    box-shadow: inset 3px 0 0 0 var(--coral), 0 0 16px rgba(255,111,89,0.18);
  }
  .track.playing .idx::before{ content:'♪'; color:var(--coral); }
  .track.dragging{ opacity:0.5; background: rgba(255,111,89,0.08); }
  .track-info{ flex:1; min-width:0; }
  .track-info .t{ font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track-info .a{ font-size:12px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .track .dur{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--ink-dim); flex-shrink:0; }
  .track .remove{ color:var(--ink-dim); background:none; border:none; padding:6px; flex-shrink:0; cursor:pointer; }
  .track .remove svg{ width:15px; height:15px; }
  .del-hold{ position:relative; overflow:hidden; }
  .del-hold .hold-fill{
    position:absolute; left:0; bottom:0; width:100%; height:0%;
    background: rgba(255,111,89,0.35); transition:none; pointer-events:none;
  }
  .del-hold.holding .hold-fill{ height:100%; transition: height 0.65s linear; }
  .del-hold.holding{ color: var(--coral); }

  .empty-list{ padding:50px 24px; text-align:center; color:var(--ink-dim); font-size:13.5px; }

  input[type=file]{ display:none; }

  /* ---------- Now playing bar ---------- */
  #nowPlaying{
    position:fixed; left:0; right:0; bottom:0; background: var(--bg-raised); border-top:1px solid var(--line);
    padding:10px 16px calc(10px + env(safe-area-inset-bottom)); display:none; flex-direction:column; gap:8px;
  }
  .np-row{ display:flex; align-items:center; gap:12px; }
  #nowPlaying .disc{ width:42px; height:42px; border-width:4px; flex-shrink:0; }
  #nowPlaying .disc::after{ width:8px; height:8px; }
  #npInfo{ flex:1; min-width:0; }
  #npInfo{ cursor:pointer; touch-action:pan-y; }
  #npInfo .t{ font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #npInfo .a{ font-size:11.5px; color:var(--ink-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #npDisc{ cursor:pointer; }
  #npControls{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
  #npControls button{ background:none; border:none; color:var(--ink); cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
  #npControls svg{ width:19px; height:19px; }
  #playPauseBtn{ background: var(--coral); border-radius:50%; width:46px; height:46px; box-shadow: 0 2px 10px rgba(255,111,89,0.35); }
  #playPauseBtn.pulse-cue{ animation: pulseCue 1.4s ease-in-out infinite; }
  @keyframes pulseCue{
    0%, 100% { box-shadow: 0 2px 10px rgba(255,111,89,0.35), 0 0 0 0 rgba(255,111,89,0.5); }
    50% { box-shadow: 0 2px 10px rgba(255,111,89,0.35), 0 0 0 9px rgba(255,111,89,0); }
  }
  #playPauseBtn svg{ fill:#FFFFFF; width:19px; height:19px; }
  #moreBtn.active{ color: var(--coral); }
  .np-extra{ padding: 2px 0 2px 54px; gap:8px; }
  .np-extra button{
    background:none; border:1px solid var(--line); color:var(--ink-dim); cursor:pointer;
    width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .np-extra svg{ width:16px; height:16px; }
  #speedBtn{ font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; width:auto !important; padding:0 8px; }
  #shuffleBtn.active, #repeatBtn.active, #speedBtn.active{ color: var(--coral); border-color: var(--coral); }

  .seek-row{ display:flex; align-items:center; gap:8px; }
  .seek-row span{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--ink-dim); width:32px; flex-shrink:0; }
  .seek-row span:last-child{ text-align:right; }
  #seekBar{ flex:1; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; background:var(--line); outline:none; }
  #seekBar::-webkit-slider-thumb{ -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:var(--coral); }

  .toast{
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background: var(--bg-raised); border:1px solid var(--line); color:var(--ink);
    padding:10px 18px; border-radius:20px; font-size:12.5px; z-index:50; display:none;
    box-shadow:0 8px 24px rgba(0,0,0,0.4);
  }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none;
    align-items:flex-end; justify-content:center; z-index:60;
  }
  .modal{
    background:var(--bg-raised); border-top:1px solid var(--line); border-radius:18px 18px 0 0;
    width:100%; max-width:480px; padding:22px 20px calc(22px + env(safe-area-inset-bottom));
    display:flex; flex-direction:column; gap:14px;
  }
  .modal h3{ font-size:18px; }
  .modal input{
    background:var(--bg); border:1px solid var(--line); color:var(--ink);
    border-radius:8px; padding:11px 12px; font-size:14px; font-family:'Inter',sans-serif; width:100%;
  }
  .modal-btns{ display:flex; gap:10px; }
  .modal-btns button{ flex:1; padding:11px; border-radius:20px; border:none; font-weight:600; font-size:14px; cursor:pointer; }
  .modal-btns .cancel{ background:none; border:1px solid var(--line); color:var(--ink-dim); }
  .modal-btns .confirm{ background:var(--coral); color:#161616; }
  .playlist-pick-btn{
    width:100%; text-align:left; padding:12px 14px; border-radius:10px;
    background:var(--bg); border:1px solid var(--line); color:var(--ink);
    font-size:14px; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .playlist-pick-btn.already{ border-color:var(--coral); color:var(--coral); }
  .theme-swatch{
    width:56px; height:56px; border-radius:14px; cursor:pointer; border:2px solid var(--line);
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .theme-swatch.selected{ border-color: var(--ink); }
  .theme-swatch .dot{ width:26px; height:26px; border-radius:50%; }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark"></div>
    <div><h1>Sidecut</h1><span>your files · no ads, ever</span></div>
  </div>
</header>
<div class="action-strip" id="actionStrip">
  <button id="addFolderBtn" class="action-pill primary">+ Add folder</button>
  <button id="addBtn" class="action-pill">+ Files</button>
  <button id="exportLibBtn" class="action-pill">Export library</button>
  <button id="importLibBtn" class="action-pill">Import library</button>
  <button id="themeBtn" class="action-pill">🎨 Colors</button>
</div>
<input type="file" id="importLibInput" accept=".zip">

<div class="toast" id="toast"></div>

<div id="emptyState">
  <div class="disc" id="emptyDisc"></div>
  <div>
    <h2>Add some music to get started</h2>
    <p>Pick your whole music folder at once — MP3, M4A, WAV, whatever's in there. Everything plays straight from your phone, nothing uploaded anywhere.</p>
  </div>
  <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
    <button id="addFolderBtnBig" class="tab active" style="padding:12px 22px; font-size:14px;">+ Choose folder</button>
    <button id="addBtnBig" class="tab" style="padding:12px 22px; font-size:14px;">+ Choose files</button>
  </div>
</div>

<div id="library">
  <div class="tabs" id="tabs"></div>
  <div class="search-row">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 001.48-5.34C15.11 5.01 12.11 2 8.5 2S1.89 5.01 1.89 8.62 4.89 15.24 8.5 15.24a6.47 6.47 0 004.11-1.48l.27.28v.79l5 4.99L19.49 18l-4.99-4zm-7 0C6.01 14 4 11.99 4 9.5S6.01 5 8.5 5 13 7.01 13 9.5 10.99 14 8.5 14z"/></svg>
    <input id="searchInput" type="text" placeholder="Search songs or artists" autocomplete="off">
  </div>
  <div id="listPane"></div>
</div>

<input type="file" id="fileInput" accept="audio/*,.mp3,.m4a,.wav,.flac,.ogg,.aac,.wma,.opus,.aiff,.alac" multiple>
<input type="file" id="folderInput" webkitdirectory directory multiple>

<div id="nowPlaying">
  <div class="np-row">
    <div class="disc" id="npDisc" title="Jump to current song"></div>
    <div id="npInfo"><div class="t" id="npTitle">—</div><div class="a" id="npArtist">—</div></div>
    <div id="npControls">
      <button id="prevBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button id="playPauseBtn"><svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button id="nextBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-9.5 6L15 18V6z"/></svg></button>
      <button id="moreBtn" title="More"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 8a2 2 0 100-4 2 2 0 000 4zm0 2a2 2 0 100 4 2 2 0 000-4zm0 6a2 2 0 100 4 2 2 0 000-4z"/></svg></button>
    </div>
  </div>
  <div class="np-row np-extra" id="npExtra" style="display:none;">
    <button id="shuffleBtn" title="Shuffle"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.83 13.41l1.41-1.41 3.83 3.83-3.83 3.83-1.41-1.41 1.42-1.42H14a3 3 0 01-2.24-1l-3.28-3.65A1 1 0 007.76 13H3v-2h4.76a3 3 0 012.24 1l3.28 3.65a1 1 0 00.72.35h2.24l-1.42-1.42zM14.83 4.59L16.24 3.18 20.07 7l-3.83 3.83-1.41-1.41L16.24 8H14a1 1 0 00-.72.35L11.15 10.6 9.7 9.03l1.83-2.03a3 3 0 012.24-1h2.24l-1.42-1.41zM3 7h2.76a3 3 0 012.24 1l.7.78-1.45 1.57-.7-.78a1 1 0 00-.72-.35H3z"/></svg></button>
    <button id="repeatBtn" title="Repeat"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 7h10v3l4-4-4-4v3H5v6h2zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2z"/></svg></button>
    <button id="speedBtn" title="Playback speed">1x</button>
    <span id="mixBadge" style="display:none; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:1px; color:var(--gold); border:1px solid var(--gold); border-radius:10px; padding:2px 7px; margin-left:auto;">MIX</span>
  </div>
  <div class="seek-row">
    <span id="curTime">0:00</span>
    <input type="range" id="seekBar" min="0" max="100" value="0">
    <span id="totalTime">0:00</span>
  </div>
</div>

<audio id="audioEl"></audio>
<audio id="audioEl2"></audio>

<!-- New playlist modal -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h3>New playlist</h3>
    <input id="playlistNameInput" placeholder="Playlist name" autocomplete="off">
    <div class="modal-btns">
      <button class="cancel" id="modalCancel">Cancel</button>
      <button class="confirm" id="modalConfirm">Create</button>
    </div>
  </div>
</div>

<!-- Add-to-playlist modal (buttons, no typing) -->
<div class="modal-backdrop" id="addToPlaylistBackdrop">
  <div class="modal">
    <h3>Add to playlist</h3>
    <div id="addToPlaylistButtons" style="display:flex; flex-direction:column; gap:8px; max-height:40vh; overflow-y:auto;"></div>
    <div class="modal-btns">
      <button class="cancel" id="addToPlaylistDone" style="flex:1;">Done</button>
    </div>
  </div>
</div>

<!-- Theme / colors modal -->
<div class="modal-backdrop" id="themeBackdrop">
  <div class="modal">
    <h3>Colors</h3>
    <div id="themePresets" style="display:flex; flex-wrap:wrap; gap:10px;"></div>
    <div style="border-top:1px solid var(--line); margin-top:4px; padding-top:14px;">
      <label style="font-size:11px; color:var(--ink-dim); font-family:'JetBrains Mono',monospace; letter-spacing:0.5px;">CUSTOM</label>
      <div style="display:flex; gap:16px; margin-top:10px; align-items:center;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <input type="color" id="customAccent1" value="#FF6F59" style="width:48px; height:48px; border:none; background:none; border-radius:50%;">
          <span style="font-size:11px; color:var(--ink-dim);">Accent</span>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; gap:6px;">
          <input type="color" id="customAccent2" value="#D4A574" style="width:48px; height:48px; border:none; background:none; border-radius:50%;">
          <span style="font-size:11px; color:var(--ink-dim);">Secondary</span>
        </div>
        <button class="playlist-pick-btn" id="applyCustomTheme" style="flex:1; text-align:center;">Apply</button>
      </div>
    </div>
    <div class="modal-btns">
      <button class="cancel" id="themeDone" style="flex:1;">Done</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(function(){
  const $ = id => document.getElementById(id);
  const toastEl = $('toast');
  function toast(msg, ms=2200){
    toastEl.textContent = msg;
    toastEl.style.display='block';
    clearTimeout(toastEl._t);
    toastEl._t = setTimeout(()=> toastEl.style.display='none', ms);
  }

  // In-memory library, backed by IndexedDB so it survives reloads —
  // once you've imported your files the first time, they auto-load
  // every time you reopen the page, no re-picking needed.
  let allTracks = [];      // { id, file, name, artist, url, duration }
  let playlists = { 'All Songs': [] }; // name -> array of track ids
  let activePlaylist = 'All Songs';
  let currentSort = 'default'; // default | alpha | artist | recent
  let searchQuery = '';
  let reorderMode = false;
  let reorderPlaylistName = null;
  let dragState = null; // { id, playlistName }
  let queue = [];          // track ids, current playback order
  let queueIndex = -1;
  let shuffle = false;
  let repeatMode = 'off';  // off | one | all
  let idCounter = 0;
  let isMixMode = false;
  let lastPlaybackState = null;
  const THEME_PRESETS = [
    { name: 'Coral & Gold', accent: '#FF6F59', accent2: '#D4A574' },
    { name: 'Teal & Lime',  accent: '#3FBFAE', accent2: '#B7D968' },
    { name: 'Purple & Pink', accent: '#B07CF0', accent2: '#F08CC4' },
    { name: 'Blue & Orange', accent: '#4A9DE0', accent2: '#F5A24A' },
    { name: 'Rose & Cream', accent: '#E0607A', accent2: '#E8D5B5' },
    { name: 'Mono', accent: '#EDECE7', accent2: '#9BAAAC' },
  ];
  let currentTheme = { accent: '#FF6F59', accent2: '#D4A574' };
  const CROSSFADE_SECONDS = 6;
  let crossfadeTriggered = false;
  let crossfadeRAF = null;
  let pendingNextIndex = null;

  const audio = $('audioEl');
  const audio2 = $('audioEl2');
  const audios = [audio, audio2];
  let activeIdx = 0;
  function activeAudio(){ return audios[activeIdx]; }
  function inactiveAudio(){ return audios[1-activeIdx]; }

  // ---------------- Persistence (IndexedDB) ----------------
  const DB_NAME = 'sidecut_local_db';
  const DB_VERSION = 1;
  let dbPromise = null;

  function openDB(){
    if(dbPromise) return dbPromise;
    dbPromise = new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);
      req.onupgradeneeded = () => {
        const db = req.result;
        if(!db.objectStoreNames.contains('tracks')) db.createObjectStore('tracks', { keyPath: 'id' });
        if(!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath: 'key' });
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return dbPromise;
  }

  async function dbPut(storeName, value){
    try{
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(value);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ console.error('Storage save failed', e); }
  }
  async function dbDelete(storeName, key){
    try{
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }catch(e){ console.error('Storage delete failed', e); }
  }
  async function dbGetAll(storeName){
    try{
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }catch(e){ console.error('Storage read failed', e); return []; }
  }

  function saveMeta(){
    dbPut('meta', { key: 'playlists', value: playlists });
    dbPut('meta', { key: 'idCounter', value: idCounter });
  }

  let lastStateSave = 0;
  function savePlaybackState(force){
    const now = Date.now();
    if(!force && now - lastStateSave < 3000) return; // throttle to avoid excess writes
    lastStateSave = now;
    if(queueIndex < 0 || queueIndex >= queue.length) return;
    const trackId = queue[queueIndex];
    dbPut('meta', {
      key: 'playback',
      value: {
        queue, queueIndex, trackId, isMixMode, shuffle, repeatMode,
        currentTime: activeAudio().currentTime || 0,
      }
    });
  }

  async function loadFromDB(){
    const [trackRows, metaRows] = await Promise.all([dbGetAll('tracks'), dbGetAll('meta')]);
    const metaMap = {};
    metaRows.forEach(r => metaMap[r.key] = r.value);
    if(metaMap.theme) currentTheme = metaMap.theme;
    applyTheme(currentTheme.accent, currentTheme.accent2, false);

    if(!trackRows.length) return false;

    allTracks = trackRows.map(r => ({
      id: r.id, file: r.blob, name: r.name, artist: r.artist,
      url: URL.createObjectURL(r.blob), duration: r.duration || null, bpm: r.bpm ?? null,
    }));
    playlists = metaMap.playlists || { 'All Songs': allTracks.map(t => t.id) };
    idCounter = metaMap.idCounter || allTracks.length;
    lastPlaybackState = metaMap.playback || null;
    return true;
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtTime(sec){
    if(!isFinite(sec) || sec < 0) sec = 0;
    const m = Math.floor(sec/60), s = Math.floor(sec%60);
    return `${m}:${String(s).padStart(2,'0')}`;
  }
  function guessMeta(filename){
    const base = filename.replace(/\.[^/.]+$/, '');
    const parts = base.split(' - ');
    if(parts.length >= 2) return { artist: parts[0].trim(), title: parts.slice(1).join(' - ').trim() };
    return { artist: 'Unknown artist', title: base };
  }

  // ---------------- File handling ----------------
  function handleFiles(fileList){
    const added = [];
    Array.from(fileList).forEach(file => {
      if(!file.type.startsWith('audio/') && !/\.(mp3|m4a|wav|ogg|flac|aac)$/i.test(file.name)) return;
      const meta = guessMeta(file.name);
      const id = 't' + (idCounter++);
      const url = URL.createObjectURL(file);
      const track = { id, file, name: meta.title, artist: meta.artist, url, duration: null };
      allTracks.push(track);
      playlists['All Songs'].push(id);
      added.push(track);
      dbPut('tracks', { id, blob: file, name: meta.title, artist: meta.artist, duration: null, bpm: null });
    });
    if(added.length){
      saveMeta();
      toast(`Added ${added.length} track${added.length>1?'s':''}`);
      $('emptyState').style.display = 'none';
      $('library').style.display = 'flex';
      renderTabs();
      renderList();
      // Read durations lazily
      added.forEach(t => {
        const a = new Audio();
        a.preload = 'metadata';
        a.src = t.url;
        a.addEventListener('loadedmetadata', () => {
          t.duration = a.duration;
          dbPut('tracks', { id: t.id, blob: t.file, name: t.name, artist: t.artist, duration: t.duration });
          renderList();
        });
      });
    } else {
      toast('No audio files found in that selection.');
    }
  }

  $('fileInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });
  $('folderInput').addEventListener('change', e => { handleFiles(e.target.files); e.target.value=''; });
  $('addBtn').addEventListener('click', () => $('fileInput').click());
  $('addBtnBig').addEventListener('click', () => $('fileInput').click());
  $('addFolderBtn').addEventListener('click', () => $('folderInput').click());
  $('addFolderBtnBig').addEventListener('click', () => $('folderInput').click());
  $('exportLibBtn').addEventListener('click', exportLibrary);
  $('importLibBtn').addEventListener('click', () => $('importLibInput').click());
  $('importLibInput').addEventListener('change', e => {
    const file = e.target.files[0];
    e.target.value = '';
    if(file) importLibrary(file);
  });
  $('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim().toLowerCase();
    renderList();
  });

  // ---------------- Tabs / playlists ----------------
  function renderTabs(){
    const tabs = $('tabs');
    tabs.innerHTML = '';
    Object.keys(playlists).forEach(name => {
      const el = document.createElement('div');
      el.className = 'tab' + (name === activePlaylist ? ' active' : '');
      el.textContent = name;
      el.addEventListener('click', () => {
        if(reorderMode) { reorderMode = false; reorderPlaylistName = null; dragState = null; }
        activePlaylist = name; renderTabs(); renderList();
      });
      tabs.appendChild(el);
    });
    const newTab = document.createElement('div');
    newTab.className = 'tab';
    newTab.textContent = '+ New playlist';
    newTab.style.borderStyle = 'dashed';
    newTab.addEventListener('click', openNewPlaylistModal);
    tabs.appendChild(newTab);
  }

  function openNewPlaylistModal(){
    $('playlistNameInput').value = '';
    $('modalBackdrop').style.display = 'flex';
    setTimeout(() => $('playlistNameInput').focus(), 50);
  }
  $('modalCancel').addEventListener('click', () => $('modalBackdrop').style.display='none');
  $('modalBackdrop').addEventListener('click', e => { if(e.target === $('modalBackdrop')) $('modalBackdrop').style.display='none'; });
  $('modalConfirm').addEventListener('click', () => {
    const name = $('playlistNameInput').value.trim();
    if(!name){ toast('Give it a name first.'); return; }
    if(playlists[name]){ toast('That playlist already exists.'); return; }
    playlists[name] = [];
    activePlaylist = name;
    saveMeta();
    $('modalBackdrop').style.display = 'none';
    renderTabs();
    renderList();
    toast(`Created "${name}"`);
  });

  function getSortedIds(ids){
    const arr = ids.slice();
    if(currentSort === 'alpha'){
      arr.sort((a,b) => (allTracks.find(t=>t.id===a)?.name||'').localeCompare(allTracks.find(t=>t.id===b)?.name||''));
    } else if(currentSort === 'artist'){
      arr.sort((a,b) => (allTracks.find(t=>t.id===a)?.artist||'').localeCompare(allTracks.find(t=>t.id===b)?.artist||''));
    } else if(currentSort === 'recent'){
      arr.reverse();
    }
    return arr;
  }

  // ---------------- List rendering ----------------
  function renderList(){
    const pane = $('listPane');
    const rawIds = playlists[activePlaylist] || [];
    let ids = getSortedIds(rawIds);
    if(searchQuery){
      ids = ids.filter(id => {
        const t = allTracks.find(tr => tr.id === id);
        if(!t) return false;
        return t.name.toLowerCase().includes(searchQuery) || t.artist.toLowerCase().includes(searchQuery);
      });
    }
    const isAllSongs = activePlaylist === 'All Songs';

    if(reorderMode && activePlaylist === reorderPlaylistName){
      renderReorderList(pane);
      return;
    }

    pane.innerHTML = '';
    const header = document.createElement('div');
    header.className = 'pane-header';
    header.innerHTML = `
      <div>
        <h2>${escapeHtml(activePlaylist)}</h2>
        <div class="sub">${ids.length} track${ids.length===1?'':'s'}</div>
      </div>
      <div class="pane-actions">
        <select id="sortSelect" style="background:var(--bg-raised); color:var(--ink-dim); border:1px solid var(--line); border-radius:8px; font-size:11.5px; padding:6px 8px; font-family:'JetBrains Mono',monospace;">
          <option value="default">Playlist order</option>
          <option value="alpha">A–Z</option>
          <option value="artist">By artist</option>
          <option value="recent">Recently added</option>
        </select>
        <button class="icon-btn" id="mixBtn" title="Mix this playlist"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M14.83 13.41l1.41-1.41 3.83 3.83-3.83 3.83-1.41-1.41 1.42-1.42H14a3 3 0 01-2.24-1l-3.28-3.65A1 1 0 007.76 13H3v-2h4.76a3 3 0 012.24 1l3.28 3.65a1 1 0 00.72.35h2.24l-1.42-1.42zM14.83 4.59L16.24 3.18 20.07 7l-3.83 3.83-1.41-1.41L16.24 8H14a1 1 0 00-.72.35L11.15 10.6 9.7 9.03l1.83-2.03a3 3 0 012.24-1h2.24l-1.42-1.41zM3 7h2.76a3 3 0 012.24 1l.7.78-1.45 1.57-.7-.78a1 1 0 00-.72-.35H3z"/></svg></button>
        <button class="icon-btn" id="exportBtn" title="${isAllSongs ? 'Export library' : 'Export list'}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 20h14v-2H5v2zm7-18L5.33 9h4.17v6h4V9h4.17L12 2z"/></svg></button>
        ${!isAllSongs ? `<button class="icon-btn" id="deletePlaylistBtn" title="Delete playlist"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>` : ''}
      </div>
    `;
    pane.appendChild(header);
    $('sortSelect').value = currentSort;
    $('sortSelect').addEventListener('change', (e) => { currentSort = e.target.value; renderList(); });
    $('mixBtn').addEventListener('click', () => startMix(ids));
    $('exportBtn').addEventListener('click', () => isAllSongs ? exportLibrary() : exportPlaylist());
    if(!isAllSongs) $('deletePlaylistBtn').addEventListener('click', deleteActivePlaylist);

    if(!ids.length){
      const empty = document.createElement('div');
      empty.className = 'empty-list';
      empty.textContent = searchQuery
        ? `No songs matching "${searchQuery}".`
        : (isAllSongs ? 'Add some songs using the button up top.' : 'This playlist is empty. Add tracks from "All Songs".');
      pane.appendChild(empty);
      return;
    }

    ids.forEach((id, i) => {
      const t = allTracks.find(tr => tr.id === id);
      if(!t) return;
      const row = document.createElement('div');
      row.className = 'track';
      row.dataset.id = id;
      row.innerHTML = `
        <div class="idx">${i+1}</div>
        <div class="track-info">
          <div class="t">${escapeHtml(t.name)}</div>
          <div class="a">${escapeHtml(t.artist)}</div>
        </div>
        <div class="dur">${t.duration ? fmtTime(t.duration) : '--:--'}</div>
        ${!isAllSongs ? `<button class="remove" data-remove="${id}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg></button>` : ''}
      `;
      let pressTimer = null;
      row.addEventListener('pointerdown', (e) => {
        if(e.target.closest('.remove')) return;
        pressTimer = setTimeout(() => {
          row._longPressTriggered = true;
          pressTimer = null;
          promptEnterReorder();
        }, 550);
      });
      ['pointerup','pointerleave','pointercancel','pointermove'].forEach(evt => {
        row.addEventListener(evt, () => { if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; } });
      });
      row.addEventListener('click', (e) => {
        if(e.target.closest('.remove')) return;
        if(row._longPressTriggered){ row._longPressTriggered = false; return; }
        playFromList(ids, id);
      });
      pane.appendChild(row);
      if(!isAllSongs){
        row.querySelector('[data-remove]').addEventListener('click', () => {
          playlists[activePlaylist] = playlists[activePlaylist].filter(x => x !== id);
          saveMeta();
          renderList();
        });
      }
    });

    // "add to playlist" and "delete" buttons per row when in All Songs
    if(isAllSongs){
      pane.querySelectorAll('.track').forEach(row => {
        const addBtn = document.createElement('button');
        addBtn.className = 'remove';
        addBtn.title = 'Add to playlist';
        addBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>`;
        addBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          promptAddToPlaylist(row.dataset.id);
        });
        row.appendChild(addBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'remove del-hold';
        delBtn.title = 'Hold to delete from library';
        delBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19a2 2 0 002 2h8a2 2 0 002-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg><span class="hold-fill"></span>`;
        delBtn.addEventListener('pointerdown', (e) => {
          e.stopPropagation();
          let held = true;
          delBtn.classList.add('holding');
          const timer = setTimeout(() => {
            if(held){ deleteTrack(row.dataset.id); }
          }, 650);
          const cancel = () => {
            held = false;
            clearTimeout(timer);
            delBtn.classList.remove('holding');
            delBtn.removeEventListener('pointerup', cancel);
            delBtn.removeEventListener('pointerleave', cancel);
            delBtn.removeEventListener('pointercancel', cancel);
          };
          delBtn.addEventListener('pointerup', cancel);
          delBtn.addEventListener('pointerleave', cancel);
          delBtn.addEventListener('pointercancel', cancel);
        });
        row.appendChild(delBtn);
      });
    }
  }

  // ---------------- Drag-to-reorder ----------------
  function promptEnterReorder(){
    const ok = confirm(`Reorder "${activePlaylist}"? You'll be able to drag songs to rearrange them.`);
    if(!ok) return;
    reorderMode = true;
    reorderPlaylistName = activePlaylist;
    currentSort = 'default';
    searchQuery = '';
    $('searchInput').value = '';
    renderList();
  }

  function exitReorderMode(){
    reorderMode = false;
    reorderPlaylistName = null;
    dragState = null;
    saveMeta();
    renderList();
  }

  function renderReorderList(pane){
    pane.innerHTML = '';
    const ids = playlists[reorderPlaylistName] || [];

    const header = document.createElement('div');
    header.className = 'pane-header';
    header.innerHTML = `
      <div>
        <h2>Reordering ${escapeHtml(reorderPlaylistName)}</h2>
        <div class="sub">Hold the grip and drag to move a song</div>
      </div>
      <div class="pane-actions">
        <button class="icon-btn" id="doneReorderBtn" title="Done" style="width:auto; padding:0 12px; color:var(--coral); border-color:var(--coral);">Done</button>
      </div>
    `;
    pane.appendChild(header);
    $('doneReorderBtn').addEventListener('click', exitReorderMode);

    if(!ids.length){
      const empty = document.createElement('div');
      empty.className = 'empty-list';
      empty.textContent = 'Nothing to reorder yet.';
      pane.appendChild(empty);
      return;
    }

    ids.forEach(id => {
      const t = allTracks.find(tr => tr.id === id);
      if(!t) return;
      const row = document.createElement('div');
      row.className = 'track';
      row.dataset.id = id;
      row.innerHTML = `
        <div class="idx grip" style="cursor:grab; font-size:16px;">☰</div>
        <div class="track-info">
          <div class="t">${escapeHtml(t.name)}</div>
          <div class="a">${escapeHtml(t.artist)}</div>
        </div>
      `;
      const grip = row.querySelector('.grip');
      grip.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        dragState = { id, playlistName: reorderPlaylistName };
        row.classList.add('dragging');
      });
      pane.appendChild(row);
    });
  }

  document.addEventListener('pointermove', (e) => {
    if(!dragState) return;
    e.preventDefault();
    const rows = Array.from(document.querySelectorAll('#listPane .track'));
    let targetRow = null;
    for(const r of rows){
      const rect = r.getBoundingClientRect();
      if(e.clientY >= rect.top && e.clientY <= rect.bottom){ targetRow = r; break; }
    }
    if(targetRow && targetRow.dataset.id !== dragState.id){
      const arr = playlists[dragState.playlistName];
      const fromIdx = arr.indexOf(dragState.id);
      const toIdx = arr.indexOf(targetRow.dataset.id);
      if(fromIdx > -1 && toIdx > -1 && fromIdx !== toIdx){
        arr.splice(fromIdx, 1);
        arr.splice(toIdx, 0, dragState.id);
        renderList();
        const newRow = document.querySelector(`.track[data-id="${dragState.id}"]`);
        if(newRow) newRow.classList.add('dragging');
      }
    }
  }, { passive: false });

  document.addEventListener('pointerup', () => {
    if(!dragState) return;
    dragState = null;
    saveMeta();
    renderList();
  });

  function deleteTrack(id){
    const t = allTracks.find(tr => tr.id === id);
    if(!t) return;
    if(!confirm(`Delete "${t.name}" from your library? This removes it from every playlist too.`)) return;

    // If it's currently playing, stop playback cleanly
    if(queue[queueIndex] === id){
      audio.pause();
      audio.removeAttribute('src');
      $('nowPlaying').style.display = 'none';
    }
    queue = queue.filter(x => x !== id);

    Object.keys(playlists).forEach(name => {
      playlists[name] = playlists[name].filter(x => x !== id);
    });
    allTracks = allTracks.filter(tr => tr.id !== id);
    URL.revokeObjectURL(t.url);
    dbDelete('tracks', id);
    saveMeta();

    toast(`Deleted "${t.name}"`);
    renderTabs();
    renderList();
  }

  function promptAddToPlaylist(trackId){
    const names = Object.keys(playlists).filter(n => n !== 'All Songs');
    const container = $('addToPlaylistButtons');
    container.innerHTML = '';
    if(!names.length){
      container.innerHTML = `<div style="color:var(--ink-dim); font-size:13.5px; padding:6px 0;">No playlists yet — make one first from the "+ New playlist" tab.</div>`;
    } else {
      names.forEach(name => {
        const already = playlists[name].includes(trackId);
        const btn = document.createElement('button');
        btn.className = 'playlist-pick-btn' + (already ? ' already' : '');
        btn.textContent = (already ? '✓ ' : '') + name;
        btn.addEventListener('click', () => {
          if(playlists[name].includes(trackId)){
            playlists[name] = playlists[name].filter(x => x !== trackId);
          } else {
            playlists[name].push(trackId);
          }
          saveMeta();
          promptAddToPlaylist(trackId); // refresh checkmarks
        });
        container.appendChild(btn);
      });
    }
    $('addToPlaylistBackdrop').style.display = 'flex';
  }
  $('addToPlaylistDone').addEventListener('click', () => { $('addToPlaylistBackdrop').style.display = 'none'; renderList(); });
  $('addToPlaylistBackdrop').addEventListener('click', e => { if(e.target === $('addToPlaylistBackdrop')){ $('addToPlaylistBackdrop').style.display='none'; renderList(); } });

  function deleteActivePlaylist(){
    if(!confirm(`Delete "${activePlaylist}"? This won't delete the songs themselves.`)) return;
    delete playlists[activePlaylist];
    activePlaylist = 'All Songs';
    saveMeta();
    renderTabs();
    renderList();
  }

  function exportPlaylist(){
    const ids = playlists[activePlaylist] || [];
    if(!ids.length){ toast('Nothing to export yet.'); return; }
    const lines = ['#EXTM3U'];
    ids.forEach(id => {
      const t = allTracks.find(tr => tr.id === id);
      if(t){
        lines.push(`#EXTINF:${Math.round(t.duration||0)},${t.artist} - ${t.name}`);
        lines.push(t.file.name);
      }
    });
    const blob = new Blob([lines.join('\n')], { type:'audio/x-mpegurl' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = activePlaylist.replace(/[^a-z0-9]/gi,'_') + '.m3u';
    a.click();
    toast('Playlist exported as .m3u');
  }

  // Full library export/import — bundles actual audio + playlists into one
  // .zip so you can carry your whole library into a newer version of this
  // page (or restore it after clearing browser data), no re-picking needed.
  async function exportLibrary(){
    if(!allTracks.length){ toast('No songs to export yet.'); return; }
    if(typeof JSZip === 'undefined'){ toast('Export tool failed to load — check your connection and reload.'); return; }
    const btn = $('exportLibBtn');
    if(btn){ btn.disabled = true; btn.textContent = 'Zipping…'; }
    try{
      const zip = new JSZip();
      const manifest = { playlists, tracks: [] };
      allTracks.forEach(t => {
        const ext = (t.file.name.match(/\.[^/.]+$/) || ['.mp3'])[0];
        const zipPath = `audio/${t.id}${ext}`;
        zip.file(zipPath, t.file);
        manifest.tracks.push({ id: t.id, name: t.name, artist: t.artist, duration: t.duration, bpm: t.bpm, path: zipPath });
      });
      zip.file('manifest.json', JSON.stringify(manifest));
      const blob = await zip.generateAsync({ type: 'blob' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'sidecut-library.zip';
      a.click();
      toast('Library exported — keep this .zip somewhere safe');
    }catch(e){
      console.error(e);
      toast('Export failed — see console for details.');
    }finally{
      if(btn){ btn.disabled = false; btn.textContent = 'Export library'; }
    }
  }

  async function importLibrary(file){
    if(typeof JSZip === 'undefined'){ toast('Import tool failed to load — check your connection and reload.'); return; }
    toast('Importing library…', 3000);
    try{
      const zip = await JSZip.loadAsync(file);
      const manifestEntry = zip.file('manifest.json');
      if(!manifestEntry){ toast('That doesn\'t look like a Sidecut library file.'); return; }
      const manifest = JSON.parse(await manifestEntry.async('string'));
      let count = 0;
      for(const m of (manifest.tracks || [])){
        if(allTracks.find(t => t.id === m.id)) continue; // already have it
        const entry = zip.file(m.path);
        if(!entry) continue;
        const blob = await entry.async('blob');
        const url = URL.createObjectURL(blob);
        const track = { id: m.id, file: blob, name: m.name, artist: m.artist, url, duration: m.duration || null, bpm: m.bpm ?? null };
        allTracks.push(track);
        dbPut('tracks', { id: m.id, blob, name: m.name, artist: m.artist, duration: m.duration || null, bpm: m.bpm ?? null });
        count++;
      }
      Object.keys(manifest.playlists || {}).forEach(name => {
        if(name === 'All Songs') return;
        if(!playlists[name]) playlists[name] = [];
        (manifest.playlists[name] || []).forEach(id => {
          if(!playlists[name].includes(id) && allTracks.find(t => t.id === id)) playlists[name].push(id);
        });
      });
      playlists['All Songs'] = allTracks.map(t => t.id);
      idCounter = Math.max(idCounter, allTracks.length);
      saveMeta();
      $('emptyState').style.display = 'none';
      $('library').style.display = 'flex';
      renderTabs();
      renderList();
      toast(`Imported ${count} track${count===1?'':'s'}`);
    }catch(e){
      console.error(e);
      toast('Import failed — is that a valid Sidecut .zip?');
    }
  }

  // ---------------- Playback (with crossfade) ----------------
  function playFromList(ids, startId){
    isMixMode = false;
    queue = shuffle ? shuffleArray(ids.slice()) : ids.slice();
    queueIndex = queue.indexOf(startId);
    cancelCrossfade();
    playCurrent(true);
  }
  function shuffleArray(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(Math.random()*(i+1));
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function playCurrent(hardSwitch){
    if(queueIndex < 0 || queueIndex >= queue.length) return;
    const t = allTracks.find(tr => tr.id === queue[queueIndex]);
    if(!t) return;
    if(hardSwitch) cancelCrossfade();
    const a = activeAudio();
    a.src = t.url;
    a.currentTime = 0;
    a.volume = 1;
    a.play().catch(()=>{});
    crossfadeTriggered = false;
    updateNowPlayingUI(t);
    savePlaybackState(true);
  }

  function updateNowPlayingUI(t){
    $('nowPlaying').style.display = 'flex';
    $('npTitle').textContent = t.name;
    $('npArtist').textContent = t.artist;
    $('npDisc').classList.add('spinning');
    $('mixBadge').style.display = isMixMode ? 'inline-block' : 'none';
    highlightPlaying(t.id);
    updateMediaSession(t);
  }

  function updateMediaSession(t){
    if(!('mediaSession' in navigator)) return;
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.name,
      artist: t.artist,
      album: 'Sidecut',
    });
  }

  function highlightPlaying(id){
    document.querySelectorAll('.track').forEach(r => r.classList.toggle('playing', r.dataset.id === id));
  }

  function cancelCrossfade(){
    if(crossfadeRAF){ clearInterval(crossfadeRAF); crossfadeRAF = null; }
    pendingNextIndex = null;
    const inactive = inactiveAudio();
    inactive.pause();
    inactive.removeAttribute('src');
    inactive.volume = 1;
    activeAudio().volume = 1;
    crossfadeTriggered = false;
  }

  function finishCrossfade(nextIndex){
    if(crossfadeRAF){ clearInterval(crossfadeRAF); crossfadeRAF = null; }
    const cur = activeAudio();
    cur.pause(); cur.currentTime = 0; cur.volume = 1;
    activeIdx = 1 - activeIdx;
    activeAudio().volume = 1; // the audio that just became active (the incoming track)
    queueIndex = nextIndex;
    crossfadeTriggered = false;
    pendingNextIndex = null;
    savePlaybackState(true);
  }

  function maybeStartCrossfade(){
    if(crossfadeTriggered) return;
    let nextIndex = queueIndex + 1;
    const wrap = repeatMode === 'all';
    if(nextIndex >= queue.length){
      if(wrap) nextIndex = 0; else return;
    }
    const nextTrack = allTracks.find(tr => tr.id === queue[nextIndex]);
    if(!nextTrack) return;

    crossfadeTriggered = true;
    pendingNextIndex = nextIndex;
    const cur = activeAudio();
    const nxt = inactiveAudio();
    nxt.src = nextTrack.url;
    nxt.currentTime = 0;
    nxt.volume = 0;
    nxt.play().catch(()=>{});
    updateNowPlayingUI(nextTrack); // show the incoming track as it starts blending in, like Spotify does

    // setInterval instead of requestAnimationFrame — rAF is fully paused by
    // the browser when the tab isn't visible (e.g. you switched to a game),
    // which would otherwise strand the fade mid-transition.
    const start = Date.now();
    const durMs = CROSSFADE_SECONDS * 1000;
    crossfadeRAF = setInterval(() => {
      const p = Math.min(1, (Date.now() - start) / durMs);
      cur.volume = 1 - p;
      nxt.volume = p;
      if(p >= 1) finishCrossfade(nextIndex);
    }, 100);
  }

  function hardAdvance(dir, wrap){
    cancelCrossfade();
    let next = queueIndex + dir;
    if(next < 0) next = wrap ? queue.length - 1 : 0;
    if(next >= queue.length){
      if(wrap) next = 0; else { $('npDisc').classList.remove('spinning'); return; }
    }
    queueIndex = next;
    playCurrent(true);
  }

  function onTimeUpdate(e){
    const a = e.target;
    if(a !== activeAudio() || !a.duration) return;
    $('seekBar').value = (a.currentTime / a.duration) * 100;
    $('curTime').textContent = fmtTime(a.currentTime);
    $('totalTime').textContent = fmtTime(a.duration);
    savePlaybackState(false);
    if(repeatMode !== 'one'){
      const remaining = a.duration - a.currentTime;
      if(remaining <= CROSSFADE_SECONDS && remaining > 0) maybeStartCrossfade();
    }
  }
  function onPlayEvt(e){
    if(e.target !== activeAudio()) return;
    $('npDisc').classList.add('spinning');
    $('playIcon').innerHTML = '<path d="M6 5h4v14H6zm8 0h4v14h-4z"/>';
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'playing';
  }
  function onPauseEvt(e){
    if(e.target !== activeAudio()) return;
    $('npDisc').classList.remove('spinning');
    $('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';
    savePlaybackState(true);
  }
  function onEnded(e){
    const a = e.target;
    if(a !== activeAudio()) return;
    if(crossfadeTriggered){
      // Fade was mid-flight (likely throttled while backgrounded) but the
      // outgoing track hit its natural end — jump straight to the next one
      // instead of silently stopping.
      if(pendingNextIndex != null) finishCrossfade(pendingNextIndex);
      return;
    }
    if(repeatMode === 'one'){ a.currentTime = 0; a.play(); return; }
    hardAdvance(1, repeatMode === 'all');
  }

  [audio, audio2].forEach(a => {
    a.addEventListener('play', onPlayEvt);
    a.addEventListener('pause', onPauseEvt);
    a.addEventListener('timeupdate', onTimeUpdate);
    a.addEventListener('ended', onEnded);
  });

  $('playPauseBtn').addEventListener('click', () => {
    $('playPauseBtn').classList.remove('pulse-cue');
    const a = activeAudio();
    a.paused ? a.play() : a.pause();
  });
  $('nextBtn').addEventListener('click', () => hardAdvance(1, true));
  $('prevBtn').addEventListener('click', () => {
    if(activeAudio().currentTime > 3){ activeAudio().currentTime = 0; return; }
    hardAdvance(-1, true);
  });
  $('shuffleBtn').addEventListener('click', () => {
    shuffle = !shuffle;
    $('shuffleBtn').classList.toggle('active', shuffle);
    toast(shuffle ? 'Shuffle on' : 'Shuffle off');
    savePlaybackState(true);
  });
  $('repeatBtn').addEventListener('click', () => {
    repeatMode = repeatMode === 'off' ? 'all' : repeatMode === 'all' ? 'one' : 'off';
    $('repeatBtn').classList.toggle('active', repeatMode !== 'off');
    toast('Repeat: ' + repeatMode);
    savePlaybackState(true);
  });
  $('seekBar').addEventListener('input', () => {
    const a = activeAudio();
    if(a.duration) a.currentTime = (($('seekBar').value)/100) * a.duration;
    savePlaybackState(true);
  });
  window.addEventListener('pagehide', () => savePlaybackState(true));
  document.addEventListener('visibilitychange', () => { if(document.hidden) savePlaybackState(true); });

  // ---------------- Now-playing extras: overflow row, speed, disc-jump, swipe-for-name ----------------
  $('moreBtn').addEventListener('click', () => {
    const extra = $('npExtra');
    const showing = extra.style.display !== 'none';
    extra.style.display = showing ? 'none' : 'flex';
    $('moreBtn').classList.toggle('active', !showing);
  });

  const SPEEDS = [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2, 2.5, 3];
  let speedIndex = 3; // 1x
  function applySpeed(){
    const rate = SPEEDS[speedIndex];
    audio.playbackRate = rate;
    audio2.playbackRate = rate;
    $('speedBtn').textContent = rate + 'x';
    $('speedBtn').classList.toggle('active', rate !== 1);
  }
  $('speedBtn').addEventListener('click', () => {
    speedIndex = (speedIndex + 1) % SPEEDS.length;
    applySpeed();
    toast(`Speed: ${SPEEDS[speedIndex]}x`);
  });

  $('npDisc').addEventListener('click', () => {
    if(queueIndex < 0 || queueIndex >= queue.length) return;
    const trackId = queue[queueIndex];
    if(!allTracks.find(t => t.id === trackId)) return;
    activePlaylist = 'All Songs';
    searchQuery = '';
    $('searchInput').value = '';
    renderTabs();
    renderList();
    highlightPlaying(trackId);
    const row = document.querySelector(`.track[data-id="${trackId}"]`);
    if(row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
  });

  // Swipe up on the title/artist to see the full, untruncated name
  (function setupSwipeForFullName(){
    const el = $('npInfo');
    let startY = null;
    el.addEventListener('touchstart', (e) => { startY = e.touches[0].clientY; }, { passive: true });
    el.addEventListener('touchend', (e) => {
      if(startY == null) return;
      const dy = startY - e.changedTouches[0].clientY;
      startY = null;
      if(dy > 30 && queueIndex >= 0 && queueIndex < queue.length){
        const t = allTracks.find(tr => tr.id === queue[queueIndex]);
        if(t) toast(`${t.name} — ${t.artist}`, 4000);
      }
    }, { passive: true });
  })();

  // ---------------- Theme / colors ----------------
  function applyTheme(accent, accent2, persist){
    currentTheme = { accent, accent2 };
    document.documentElement.style.setProperty('--coral', accent);
    document.documentElement.style.setProperty('--gold', accent2);
    if(persist) dbPut('meta', { key: 'theme', value: currentTheme });
  }

  function renderThemePresets(){
    const wrap = $('themePresets');
    wrap.innerHTML = '';
    THEME_PRESETS.forEach(p => {
      const el = document.createElement('div');
      const isSelected = currentTheme.accent.toLowerCase() === p.accent.toLowerCase() && currentTheme.accent2.toLowerCase() === p.accent2.toLowerCase();
      el.className = 'theme-swatch' + (isSelected ? ' selected' : '');
      el.title = p.name;
      el.innerHTML = `<div class="dot" style="background:linear-gradient(135deg, ${p.accent2}, ${p.accent});"></div>`;
      el.addEventListener('click', () => {
        applyTheme(p.accent, p.accent2, true);
        toast(`Theme: ${p.name}`);
        renderThemePresets();
      });
      wrap.appendChild(el);
    });
  }

  $('themeBtn').addEventListener('click', () => {
    $('customAccent1').value = currentTheme.accent;
    $('customAccent2').value = currentTheme.accent2;
    renderThemePresets();
    $('themeBackdrop').style.display = 'flex';
  });
  $('themeDone').addEventListener('click', () => { $('themeBackdrop').style.display = 'none'; });
  $('themeBackdrop').addEventListener('click', e => { if(e.target === $('themeBackdrop')) $('themeBackdrop').style.display = 'none'; });
  $('applyCustomTheme').addEventListener('click', () => {
    applyTheme($('customAccent1').value, $('customAccent2').value, true);
    toast('Custom theme applied');
    renderThemePresets();
  });

  // ---------------- Media Session: lock screen / notification controls ----------------
  if('mediaSession' in navigator){
    navigator.mediaSession.setActionHandler('play', () => activeAudio().play());
    navigator.mediaSession.setActionHandler('pause', () => activeAudio().pause());
    navigator.mediaSession.setActionHandler('previoustrack', () => {
      if(activeAudio().currentTime > 3){ activeAudio().currentTime = 0; return; }
      hardAdvance(-1, true);
    });
    navigator.mediaSession.setActionHandler('nexttrack', () => hardAdvance(1, true));
    try{
      navigator.mediaSession.setActionHandler('seekto', (details) => {
        if(details.seekTime != null) activeAudio().currentTime = details.seekTime;
      });
    }catch(e){ /* not all browsers support seekto */ }
  }

  // ---------------- Mix: tempo analysis + compatibility ordering ----------------
  async function estimateBPM(track){
    const resp = await fetch(track.url);
    const arrBuf = await resp.arrayBuffer();
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    let audioBuffer;
    try{
      audioBuffer = await ctx.decodeAudioData(arrBuf);
    } finally {
      ctx.close();
    }
    const sampleRate = audioBuffer.sampleRate;
    const raw = audioBuffer.getChannelData(0);
    const maxSamples = Math.min(raw.length, sampleRate * 45); // analyze up to first 45s
    const data = raw.subarray(0, maxSamples);

    const hop = Math.round(sampleRate * 0.01); // 10ms frames
    const frameCount = Math.floor(data.length / hop);
    if(frameCount < 20) return null;
    const envelope = new Float32Array(frameCount);
    for(let i=0;i<frameCount;i++){
      let sum = 0;
      const start = i*hop, end = Math.min(start+hop, data.length);
      for(let j=start;j<end;j++) sum += data[j]*data[j];
      envelope[i] = Math.sqrt(sum / hop);
    }
    const onset = new Float32Array(frameCount);
    for(let i=1;i<frameCount;i++){
      const d = envelope[i] - envelope[i-1];
      onset[i] = d > 0 ? d : 0;
    }
    const frameRate = 100; // frames per second given 10ms hop
    const minBPM = 50, maxBPM = 200;
    const minLag = Math.max(1, Math.round(frameRate*60/maxBPM));
    const maxLag = Math.min(frameCount-1, Math.round(frameRate*60/minBPM));
    let bestLag = minLag, bestScore = -Infinity;
    for(let lag=minLag; lag<=maxLag; lag++){
      let score = 0;
      for(let i=0; i+lag<frameCount; i++) score += onset[i]*onset[i+lag];
      if(score > bestScore){ bestScore = score; bestLag = lag; }
    }
    return Math.round(60 / (bestLag/frameRate));
  }

  function buildMixOrder(tracks){
    // Chain tracks by nearest tempo so each transition feels close in energy/pace —
    // an approximation of "songs that go together," not true key/genre matching.
    const withBpm = tracks.filter(t => t.bpm != null);
    const withoutBpm = tracks.filter(t => t.bpm == null);
    if(!withBpm.length) return tracks.slice();
    withBpm.sort((a,b) => a.bpm - b.bpm);
    const ordered = [withBpm[0]];
    const remaining = withBpm.slice(1);
    while(remaining.length){
      const last = ordered[ordered.length-1];
      let bestIdx = 0, bestDiff = Infinity;
      remaining.forEach((t,i) => { const d = Math.abs(t.bpm - last.bpm); if(d < bestDiff){ bestDiff = d; bestIdx = i; } });
      ordered.push(remaining.splice(bestIdx,1)[0]);
    }
    return ordered.concat(withoutBpm);
  }

  async function startMix(ids){
    if(!ids || !ids.length){ toast('Nothing to mix yet.'); return; }
    if(ids.length < 2){ toast('Add a couple more songs to mix.'); return; }
    const mixBtn = $('mixBtn');
    if(mixBtn) mixBtn.disabled = true;
    try{
      const tracks = ids.map(id => allTracks.find(t => t.id === id)).filter(Boolean);
      for(let i=0;i<tracks.length;i++){
        const t = tracks[i];
        if(t.bpm == null){
          toast(`Analyzing tempo ${i+1}/${tracks.length}…`, 1800);
          t.bpm = await estimateBPM(t).catch(() => null);
          dbPut('tracks', { id: t.id, blob: t.file, name: t.name, artist: t.artist, duration: t.duration, bpm: t.bpm });
        }
      }
      const ordered = buildMixOrder(tracks);
      isMixMode = true;
      queue = ordered.map(t => t.id);
      queueIndex = 0;
      cancelCrossfade();
      playCurrent(true);
      toast('Mix started — tracks will blend into each other');
    }catch(e){
      console.error(e);
      toast('Could not build a mix from this playlist.');
    }finally{
      if(mixBtn) mixBtn.disabled = false;
    }
  }

  // ---------------- Boot: auto-load anything saved from before ----------------
  (async function boot(){
    try{
      const loaded = await loadFromDB();
      if(loaded){
        $('emptyState').style.display = 'none';
        $('library').style.display = 'flex';
        renderTabs();
        renderList();
        toast(`Welcome back — ${allTracks.length} track${allTracks.length===1?'':'s'} loaded`);
        restorePlaybackState();
      }
    }catch(e){
      console.error('Auto-load failed', e);
    }
  })();

  function restorePlaybackState(){
    const state = lastPlaybackState;
    if(!state || !state.trackId) return;
    const validQueue = (state.queue || []).filter(id => allTracks.find(t => t.id === id));
    if(!validQueue.length) return;
    const track = allTracks.find(t => t.id === state.trackId);
    if(!track) return;

    queue = validQueue;
    queueIndex = validQueue.indexOf(state.trackId);
    if(queueIndex < 0) queueIndex = 0;
    isMixMode = !!state.isMixMode;
    shuffle = !!state.shuffle;
    repeatMode = state.repeatMode || 'off';
    $('shuffleBtn').classList.toggle('active', shuffle);
    $('repeatBtn').classList.toggle('active', repeatMode !== 'off');

    const a = activeAudio();
    a.src = track.url;
    const resumeAt = state.currentTime || 0;
    a.addEventListener('loadedmetadata', function onMeta(){
      a.currentTime = resumeAt;
      $('seekBar').value = a.duration ? (resumeAt / a.duration) * 100 : 0;
      $('curTime').textContent = fmtTime(resumeAt);
      $('totalTime').textContent = fmtTime(a.duration || 0);
      a.removeEventListener('loadedmetadata', onMeta);
    }, { once: true });

    // Paused on purpose — mobile browsers block autoplay without a tap anyway.
    $('nowPlaying').style.display = 'flex';
    $('npTitle').textContent = track.name;
    $('npArtist').textContent = track.artist;
    $('mixBadge').style.display = isMixMode ? 'inline-block' : 'none';
    highlightPlaying(track.id);
    updateMediaSession(track);
    if('mediaSession' in navigator) navigator.mediaSession.playbackState = 'paused';

    const row = document.querySelector(`.track[data-id="${track.id}"]`);
    if(row) row.scrollIntoView({ block: 'start', behavior: 'smooth' });

    $('playPauseBtn').classList.add('pulse-cue');
    toast(`Tap play to pick back up on "${track.name}"`, 3500);
  }

  // ---------------- PWA: register service worker so this can be installed ----------------
  // Only matters once these files are hosted online (https) — a plain
  // downloaded/local file won't trigger an install prompt, that's an OS-level
  // restriction no website can bypass.
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration skipped:', err));
    });
  }

})();
</script>
</body>
